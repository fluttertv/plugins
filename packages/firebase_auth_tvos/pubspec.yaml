name: firebase_auth_tvos
description: >-
  tvOS (Apple TV) implementation of the firebase_auth Flutter plugin, supporting
  anonymous, email/password and Sign in with Apple authentication on Apple TV.
version: 0.0.1
homepage: https://fluttertv.dev
repository: https://github.com/fluttertv/plugins/tree/main/packages/firebase_auth_tvos
issue_tracker: https://github.com/fluttertv/plugins/issues
# Generated by `flutter-tvos plugin port`. See PORTING_REPORT.md.
# License holder: fluttertv

# The example ships the standard FlutterFire demo-project GoogleService
# values (client-side Firebase identifiers, not secrets). Tell pub's secret
# scanner they are intentional, matching upstream firebase_auth's pubspec.
false_secrets:
  - example/**

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^6.5.4
  # Transitive Dart dependency so the app's dependency graph includes
  # firebase_core_tvos — our plugin discovery (tvos_plugins.dart) only adds
  # a package's native pod to the generated Podfile if it's reachable here,
  # which the podspec's `s.dependency 'firebase_core_tvos'` then resolves
  # against locally instead of failing over to upstream's iOS-only pod.
  # Hosted constraint for pub.dev (path deps can't be published); local
  # development resolves it via pubspec_overrides.yaml until it's published.
  firebase_core_tvos: ^0.0.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      tvos:
        pluginClass: FLTFirebaseAuthPlugin
