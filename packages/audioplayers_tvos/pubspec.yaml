name: audioplayers_tvos
description: "tvOS (Apple TV) implementation of the audioplayers Flutter plugin, provided by flutter-tvos."
version: 0.0.1
homepage: https://fluttertv.dev
repository: https://github.com/fluttertv/plugins/tree/main/packages/audioplayers_tvos
issue_tracker: https://github.com/fluttertv/plugins/issues
# Generated by `flutter-tvos plugin port`. See PORTING_REPORT.md.
# License holder: The FlutterTV Authors

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers_platform_interface: ^7.1.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      tvos:
        pluginClass: AudioplayersDarwinPlugin
