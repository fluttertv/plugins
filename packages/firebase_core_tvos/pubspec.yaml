name: firebase_core_tvos
description: >-
  tvOS (Apple TV) implementation of the firebase_core Flutter plugin, enabling
  Firebase initialization on Apple TV via the flutter-tvos toolchain.
version: 0.0.1
homepage: https://fluttertv.dev
repository: https://github.com/fluttertv/plugins/tree/main/packages/firebase_core_tvos
issue_tracker: https://github.com/fluttertv/plugins/issues
# Generated by `flutter-tvos plugin port`. See PORTING_REPORT.md.
# License holder: fluttertv

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.11.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      tvos:
        pluginClass: FLTFirebaseCorePlugin
