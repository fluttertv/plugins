name: sqflite_tvos
description: "tvOS (Apple TV) implementation of the sqflite Flutter plugin, provided by flutter-tvos."
version: 0.0.1
homepage: https://fluttertv.dev
repository: https://github.com/fluttertv/plugins/tree/main/packages/sqflite_tvos
issue_tracker: https://github.com/fluttertv/plugins/issues
# Generated by `flutter-tvos plugin port`. See PORTING_REPORT.md.
# License holder: The FlutterTV Authors

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  # Skip the `-0` pre-release suffix so this stable release does not
  # have to be published as a pre-release itself (pub.dev policy).
  sqflite_platform_interface: ">=2.4.0 <4.0.0"

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      tvos:
        pluginClass: SqflitePlugin
        dartPluginClass: SqfliteDarwin
