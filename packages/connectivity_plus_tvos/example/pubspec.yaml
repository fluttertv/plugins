name: connectivity_plus_example
description: Demonstrates how to use the connectivity_plus plugin.

environment:
  sdk: '>=2.12.0 <4.0.0'

dependencies:
  connectivity_plus: ^7.1.1
  connectivity_plus_tvos:
    path: ../
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  test: ^1.16.4
  flutter_lints: ">=4.0.0 <6.0.0"

flutter:
  uses-material-design: true
